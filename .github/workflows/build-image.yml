name: Build and Push Docker Images

# Builds the frontend and backend Docker images from their existing
# multi-stage Dockerfiles, tags each with the Git commit SHA (never
# "latest"), pushes them to GitHub Container Registry, and updates the SSM
# parameters the Terraform ECS module reads at plan time - so shipping a
# new image is just "push to main," with no manual steps and no Terraform
# code changes.

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Minimum permissions this workflow actually needs - nothing broader.
permissions:
  contents: read # actions/checkout only needs to read the repo
  packages: write # required to push images to GHCR
  id-token: write # required for AWS OIDC (no access keys)

env:
  REGISTRY: ghcr.io
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  SSM_FRONTEND_PARAM: ${{ vars.SSM_FRONTEND_PARAM }}
  SSM_BACKEND_PARAM: ${{ vars.SSM_BACKEND_PARAM }}

jobs:
  build-and-push:
    name: Build, Push, and Publish Image URIs
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Extract Git Commit SHA (short) and store it for later steps
      - name: Extract short Git commit SHA
        run: echo "GIT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      # GHCR/Docker image references must be all-lowercase, but
      # github.repository preserves the repository's actual casing - this
      # normalizes it once, up front, for every tag built below.
      - name: Normalize image repository path to lowercase
        run: echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      # 4. Login to GitHub Container Registry
      # Uses the automatically issued GITHUB_TOKEN - no personal access
      # token or stored secret required. This is what the packages: write
      # permission above actually authorizes.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Build Frontend Docker Image
      - name: Build frontend image
        run: |
          docker buildx build \
            --file project/frontend/Dockerfile \
            --tag "$REGISTRY/$IMAGE_REPO/frontend:$GIT_SHA" \
            --load \
            project/frontend

      # 6. Push Frontend Image
      - name: Push frontend image
        run: docker push "$REGISTRY/$IMAGE_REPO/frontend:$GIT_SHA"

      # 7. Build Backend Docker Image
      - name: Build backend image
        run: |
          docker buildx build \
            --file project/backend/Dockerfile \
            --tag "$REGISTRY/$IMAGE_REPO/backend:$GIT_SHA" \
            --load \
            project/backend

      # 8. Push Backend Image
      - name: Push backend image
        run: docker push "$REGISTRY/$IMAGE_REPO/backend:$GIT_SHA"

      # 9. Authenticate to AWS using GitHub OIDC - no AWS access keys exist
      # anywhere in this workflow. This exchanges a short-lived GitHub JWT
      # for temporary AWS credentials by assuming the existing IAM role.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 10. Update AWS Systems Manager Parameter Store
      # Overwrites the existing parameters with the image URIs just pushed
      # above - this is the handoff point the Terraform ECS module's
      # aws_ssm_parameter data source reads from at the next plan/apply.
      - name: Update SSM parameter - frontend image URI
        run: |
          aws ssm put-parameter \
            --name "$SSM_FRONTEND_PARAM" \
            --value "$REGISTRY/$IMAGE_REPO/frontend:$GIT_SHA" \
            --type String \
            --overwrite

      - name: Update SSM parameter - backend image URI
        run: |
          aws ssm put-parameter \
            --name "$SSM_BACKEND_PARAM" \
            --value "$REGISTRY/$IMAGE_REPO/backend:$GIT_SHA" \
            --type String \
            --overwrite

      # 11. Display Final Image URIs
      - name: Display final image URIs
        run: |
          echo "Frontend image: $REGISTRY/$IMAGE_REPO/frontend:$GIT_SHA"
          echo "Backend image:  $REGISTRY/$IMAGE_REPO/backend:$GIT_SHA"
          {
            echo "### Published Image URIs"
            echo ""
            echo "| Service  | Image URI |"
            echo "|----------|-----------|"
            echo "| Frontend | \`$REGISTRY/$IMAGE_REPO/frontend:$GIT_SHA\` |"
            echo "| Backend  | \`$REGISTRY/$IMAGE_REPO/backend:$GIT_SHA\` |"
          } >> "$GITHUB_STEP_SUMMARY"
