name: Build and Push Docker Images

on:

  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "release/**"
    paths: &app_paths

      - "project/frontend/**"
      - "project/backend/**"

      - "!project/**/*.md"

      - ".github/workflows/build-image.yml"

  pull_request:
    branches:
      - main
      - "release/**"
    paths: *app_paths
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  SSM_FRONTEND_PARAM: ${{ vars.SSM_FRONTEND_PARAM }}
  SSM_BACKEND_PARAM: ${{ vars.SSM_BACKEND_PARAM }}

jobs:
  build-and-push:
    name: Build, Push, and Publish Image URIs
    runs-on: ubuntu-latest

    env:
      PUBLISH: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        uses: ./.github/actions/set-image-metadata

      - name: Log in to GitHub Container Registry
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: project/frontend/Dockerfile
          context: project/frontend
          tag: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${{ env.GIT_SHA }}

      - name: Push frontend image
        if: env.PUBLISH == 'true'
        uses: ./.github/actions/push-docker-image
        with:
          tag: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${{ env.GIT_SHA }}

      - name: Build backend image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: project/backend/Dockerfile
          context: project/backend
          tag: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${{ env.GIT_SHA }}

      - name: Push backend image
        if: env.PUBLISH == 'true'
        uses: ./.github/actions/push-docker-image
        with:
          tag: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${{ env.GIT_SHA }}

      - name: Configure AWS credentials (OIDC)
        if: env.PUBLISH == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update SSM parameter - frontend image URI
        if: env.PUBLISH == 'true'
        uses: ./.github/actions/put-ssm-parameter
        with:
          name: ${{ env.SSM_FRONTEND_PARAM }}
          value: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${{ env.GIT_SHA }}

      - name: Update SSM parameter - backend image URI
        if: env.PUBLISH == 'true'
        uses: ./.github/actions/put-ssm-parameter
        with:
          name: ${{ env.SSM_BACKEND_PARAM }}
          value: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${{ env.GIT_SHA }}

      - name: Configure AWS credentials for colleague account (second hop)
        if: env.PUBLISH == 'true' && vars.AWS_ROLE_ARN_MULTI != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_MULTI }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update colleague account SSM parameter - frontend image URI
        if: env.PUBLISH == 'true' && vars.AWS_ROLE_ARN_MULTI != ''
        uses: ./.github/actions/put-ssm-parameter
        with:
          name: ${{ env.SSM_FRONTEND_PARAM }}
          value: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${{ env.GIT_SHA }}

      - name: Update colleague account SSM parameter - backend image URI
        if: env.PUBLISH == 'true' && vars.AWS_ROLE_ARN_MULTI != ''
        uses: ./.github/actions/put-ssm-parameter
        with:
          name: ${{ env.SSM_BACKEND_PARAM }}
          value: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${{ env.GIT_SHA }}

      - name: Display build validation summary
        if: env.PUBLISH != 'true'
        uses: ./.github/actions/build-validation-summary
        with:
          event-name: ${{ github.event_name }}
          ref: ${{ github.ref }}

      - name: Display final image URIs
        if: env.PUBLISH == 'true'
        uses: ./.github/actions/published-images-summary
        with:
          registry: ${{ env.REGISTRY }}
          image-repo: ${{ env.IMAGE_REPO }}
          git-sha: ${{ env.GIT_SHA }}
          colleague-role-arn: ${{ vars.AWS_ROLE_ARN_MULTI }}
