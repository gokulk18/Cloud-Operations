name: Infrastructure Pipeline









on:





  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "release/**"
    paths: &infra_paths






      - "terraform/**"
      - "live/**"


      - "!**/*.md"



      - ".github/workflows/terraform.yml"



  pull_request:
    branches:
      - main
      - "release/**"
    paths: *infra_paths
  workflow_dispatch:
    inputs:
      account:
        description: "AWS account to deploy to"
        type: choice
        options: [dev, multi]
        default: dev
      action:
        description: "Terragrunt action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan




concurrency:
  group: terragrunt-${{ github.event.inputs.account || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.12.2"
  TERRAGRUNT_VERSION: "1.1.1"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_DEPLOY_ROLE_ARN: ${{ vars.TF_DEPLOY_ROLE_ARN }}

  ACCOUNT: ${{ github.event.inputs.account || 'dev' }}

jobs:






  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4





      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false




      - name: Install Terragrunt
        run: |
          curl -sL -o /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version







      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt run --all init
        run: terragrunt run --all init --non-interactive

      - name: Terragrunt run --all validate
        run: terragrunt run --all validate --non-interactive









      - name: Terragrunt run --all plan
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            terragrunt run --all --non-interactive -- plan -destroy 2>&1 | tee plan_output.txt
          else
            terragrunt run --all plan --non-interactive 2>&1 | tee plan_output.txt
          fi

      - name: Comment plan on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- terragrunt-plan-comment -->';
            const maxLength = 60000;

            let planText = fs.readFileSync('live/dev/us-east-1/plan_output.txt', 'utf8');
            if (planText.length > maxLength) {
              planText = planText.substring(0, maxLength) + '\n... (truncated)';
            }

            const body = `${marker}\n### Terragrunt Plan (dev)\n\n\`\`\`\n${planText}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }












  apply:
    name: Terragrunt Apply
    needs: plan
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL -o /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt run --all init
        run: terragrunt run --all init --non-interactive





      - name: Terragrunt run --all apply or destroy
        run: |
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            terragrunt run --all destroy --non-interactive
          else
            terragrunt run --all apply --non-interactive
          fi

      - name: Display outputs
        if: github.event.inputs.action != 'destroy'
        run: terragrunt run --all output --non-interactive
