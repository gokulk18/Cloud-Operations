name: Infrastructure Pipeline

on:

  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "release/**"
    paths: &infra_paths

      - "terraform/**"
      - "live/**"

      - "!**/*.md"

      - ".github/workflows/terraform.yml"

  pull_request:
    branches:
      - main
      - "release/**"
    paths: *infra_paths
  workflow_dispatch:
    inputs:
      account:
        description: "AWS account to deploy to"
        type: choice
        options: [dev, multi]
        default: dev
      action:
        description: "Terragrunt action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan

concurrency:
  group: terragrunt-${{ github.event.inputs.account || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.12.2"
  TERRAGRUNT_VERSION: "1.1.1"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_DEPLOY_ROLE_ARN: ${{ vars.TF_DEPLOY_ROLE_ARN }}

  ACCOUNT: ${{ github.event.inputs.account || 'dev' }}

jobs:

  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        uses: ./.github/actions/setup-terragrunt
        with:
          version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt run --all init
        uses: ./.github/actions/terragrunt-init
        with:
          working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1

      - name: Terragrunt run --all validate
        uses: ./.github/actions/terragrunt-validate
        with:
          working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1

      - name: Terragrunt run --all plan
        uses: ./.github/actions/terragrunt-plan
        with:
          destroy: ${{ github.event.inputs.action == 'destroy' }}
          working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1

      - name: Comment plan on pull request
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/comment-terragrunt-plan
        with:
          plan-file: live/dev/us-east-1/plan_output.txt
          account: dev

  apply:
    name: Terragrunt Apply
    needs: plan
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        uses: ./.github/actions/setup-terragrunt
        with:
          version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt run --all init
        uses: ./.github/actions/terragrunt-init
        with:
          working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1

      - name: Terragrunt run --all apply or destroy
        uses: ./.github/actions/terragrunt-apply
        with:
          destroy: ${{ github.event.inputs.action == 'destroy' }}
          working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1

      - name: Display outputs
        if: github.event.inputs.action != 'destroy'
        uses: ./.github/actions/terragrunt-output
        with:
          working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1
