name: Infrastructure Pipeline

# Plans and applies the Terragrunt-orchestrated AWS infrastructure. Terraform
# itself is only used internally, by Terragrunt - this workflow never calls
# `terraform` directly. Pull requests get a plan-only run, commented on the
# PR. Pushes to main - and manual runs - plan, then pause for a required
# approval (via the "production" GitHub Environment) before applying.
# workflow_dispatch additionally lets you pick which AWS account to target
# and whether to plan, apply, or destroy.

on:
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/modules/**"
      - "live/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: ["main"]
    paths:
      - "terraform/modules/**"
      - "live/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      account:
        description: "AWS account to deploy to"
        type: choice
        options: [dev, multi]
        default: dev
      action:
        description: "Terragrunt action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan

# Keyed on account AND ref, so a dev run and a multi run can proceed
# independently, but two runs against the SAME account queue behind each
# other instead of racing.
concurrency:
  group: terragrunt-${{ github.event.inputs.account || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.12.2"
  TERRAGRUNT_VERSION: "1.1.1"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_DEPLOY_ROLE_ARN: ${{ vars.TF_DEPLOY_ROLE_ARN }}
  # push events have no workflow_dispatch inputs at all - default to dev.
  ACCOUNT: ${{ github.event.inputs.account || 'dev' }}

jobs:
  # ---------------------------------------------------------------------------
  # Job: Plan
  # ---------------------------------------------------------------------------
  # Always runs first. Plans every module in the selected account/region in
  # dependency order (Terragrunt's run --all), and on pull requests, posts
  # the combined output as a PR comment.
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # terraform_wrapper: false - same reason as before: Terragrunt shells
      # out to the real terraform binary, and the wrapper's exit-code
      # handling causes confusing false negatives that have nothing to do
      # with Terragrunt itself.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      # Installed directly from GitHub Releases rather than a third-party
      # setup action, so the exact install mechanism is fully known and
      # under version control here.
      - name: Install Terragrunt
        run: |
          curl -sL -o /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      # Authenticate to AWS using GitHub OIDC - no access keys anywhere in
      # this workflow. This is the FIRST of two role-assumption hops: this
      # step assumes TF_DEPLOY_ROLE_ARN directly; Terragrunt's generated
      # provider.tf then assumes the SAME (or, for other accounts, a
      # different) role a second time via account.hcl's deployment_role_arn
      # - which is why the role's trust policy also trusts itself.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt run --all init
        run: terragrunt run --all init --non-interactive

      - name: Terragrunt run --all validate
        run: terragrunt run --all validate --non-interactive

      # Plans every module in this account/region in dependency order.
      # Read-only - never applies anything.
      #
      # -destroy is a Terraform/OpenTofu plan flag, not a Terragrunt flag, so
      # under Terragrunt's redesigned `run` CLI (1.x) it must be forwarded
      # explicitly after `--`, or Terragrunt rejects it outright with
      # "flag `-destroy` is not a Terragrunt flag". Terragrunt's own flags
      # (--all, --non-interactive) still go before the `--`.
      - name: Terragrunt run --all plan
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            terragrunt run --all --non-interactive -- plan -destroy 2>&1 | tee plan_output.txt
          else
            terragrunt run --all plan --non-interactive 2>&1 | tee plan_output.txt
          fi

      - name: Comment plan on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- terragrunt-plan-comment -->';
            const maxLength = 60000;

            let planText = fs.readFileSync('live/dev/us-east-1/plan_output.txt', 'utf8');
            if (planText.length > maxLength) {
              planText = planText.substring(0, maxLength) + '\n... (truncated)';
            }

            const body = `${marker}\n### Terragrunt Plan (dev)\n\n\`\`\`\n${planText}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # Job: Apply
  # ---------------------------------------------------------------------------
  # Never runs for pull requests. Runs on every push to main (always
  # "apply"), or on a manual dispatch where action is "apply" or "destroy".
  # Gated by the "production" GitHub Environment - pauses here until a
  # required reviewer approves, in the GitHub UI, before any real change
  # happens.
  apply:
    name: Terragrunt Apply
    needs: plan
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: live/${{ github.event.inputs.account || 'dev' }}/us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sL -o /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt run --all init
        run: terragrunt run --all init --non-interactive

      # run --all destroy automatically reverses the dependency graph
      # (cloudwatch/autoscaling before ecs before alb before security
      # before vpc) - no manual ordering needed, Terragrunt derives it from
      # the same dependency blocks used for apply.
      - name: Terragrunt run --all apply or destroy
        run: |
          if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            terragrunt run --all destroy --non-interactive
          else
            terragrunt run --all apply --non-interactive
          fi

      - name: Display outputs
        if: github.event.inputs.action != 'destroy'
        run: terragrunt run --all output --non-interactive
