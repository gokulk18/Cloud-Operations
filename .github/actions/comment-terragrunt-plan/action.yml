name: Comment Terragrunt plan
description: Creates or refreshes the Terragrunt plan comment on a pull request.
inputs:
  plan-file:
    required: true
  account:
    required: true
runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- terragrunt-plan-comment -->';
          const maxLength = 60000;

          let planText = fs.readFileSync('${{ inputs.plan-file }}', 'utf8');
          if (planText.length > maxLength) {
            planText = planText.substring(0, maxLength) + '\n... (truncated)';
          }

          const body = `${marker}\n### Terragrunt Plan (${{ inputs.account }})\n\n\`\`\`\n${planText}\n\`\`\``;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find((c) => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
